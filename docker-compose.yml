version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: campus_connect_db
    environment:
      POSTGRES_DB: campus_connect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus_connect_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/campus_connect
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      # Allow frontend to access the backend API
      - CORS_ALLOWED_ORIGINS=http://localhost:4200,http://localhost:80
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campus_connect_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
