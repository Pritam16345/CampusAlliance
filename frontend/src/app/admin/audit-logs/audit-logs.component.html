<div class="page-container">
  <div class="page-header">
    <h1>Audit Logs</h1>
    <p>Timeline of recent system actions</p>
  </div>

  <div class="card p-0" style="padding:0; overflow:hidden">
    <table class="user-table">
      <thead>
        <tr>
          <th>TIME</th>
          <th>USER</th>
          <th>ACTION TYPE</th>
          <th>DESCRIPTION</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let log of logs">
          <td style="white-space: nowrap;">{{log.timestamp | date:'medium'}}</td>
          <td>{{log.userEmail}}</td>
          <td><span class="badge" [ngClass]="getBadgeClass(log.actionType)">{{log.actionType}}</span></td>
          <td>{{log.details}}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
